<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,500;0,600;0,700;0,800;0,900;0,1000;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>TypeWeather</title>
</head>
<body>
    <header>
        <img src="Imagens/Logo.png" alt="Logo">
        <h1 class="type-title">TypeWeather</h1>
    </header>
    <main>
        <h1 class="type-presentation">Boas vindas ao <span>TypeWeather</span></h1>
        <p>Escolha um local para ver a previsão do tempo</p>
        <div class="type-search">
            <input type="text" name="buscar" id="buscar" placeholder=" Buscar Local">
        </div>
    </main>
    <script src="Javascript/script.js"></script>
    <script src="Javascript/estados.js"></script>
    
</body>
</html>
