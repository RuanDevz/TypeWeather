<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/estilos/styledashboard.css">
    <title>Dash</title>
</head>
<body>
    <header>
        <img src="Imagens/Home (1).png" alt="logo">
        <input type="text" name="buscar" id="buscar" placeholder="Buscar Local">
        <div id="loading" class="loader"></div>
    </header>
    <main>
        <section class="type-background">
            <div class="type-info-top">
                <h1 id="Nomeestado">Porto Alegre</h1>
                <p id="date"></p>
            </div>
            <div class="type-hour">
                <p id="hours"></p>
            </div>
            <div class="type-info-bot">
                <div>
                    <h1 id="temperature">28°c</h1>
                    <h2>26°c / 32°c</h2>
                    <p>Poucas nuvens</p>
                </div>
                <div>
                    <img src="Imagens/Previsão-Icons/Weather=Cloudy, Moment=Day.png" alt="Logo-previsão">
                </div>
            </div>
        </section>
        <section>
            <div class="type-more-infos">
                <div id="infos" class="type-termic">
                    <img src="Imagens/icons/Type=thermometer-simple-light.png" alt="Temperatura">
                    <p>Sensação térmica</p>
                    <p id="termic" class="info-result"></p>
                </div>
                <div id="infos" class="type-rain">
                    <img src="Imagens/icons/Type=cloud-rain-light.png" alt="Chuva">
                    <p>Probabilidade de chuva</p>
                    <p id="rain" class="info-result"></p>
                </div>
                <div id="infos" class="type-wind">
                    <img src="Imagens/icons/Type=wind-light.png" alt="Vento">
                    <p>Velocidade do Vento</p>
                    <p id="wind" class="info-result"></p>
                </div>
                <div id="infos" class="type-moisture">
                    <img src="Imagens/icons/Type=drop-light.png" alt="Umidade">
                    <p>Umidade do ar</p>
                    <p id="umidify" class="info-result"></p>
                </div>
                <div id="infos" class="type-uv">
                    <img src="Imagens/icons/Type=sun-dim-light.png" alt="índice UV">
                    <p>Indice UV</p>
                    <p id="uv" class="info-result"></p>
                </div>
            </div>
        </section>
        <section>
            <div class="type-container-days">
                <div>
                    <h1>Ter</h1>
                    <img src="Imagens/Icons para próximos dias/Chuva.png" alt="tempo">
                    <h2>32°c</h2>
                </div>
                <div>
                    <h1>Qua</h1>
                    <img src="Imagens/Icons para próximos dias/Nublado.png" alt="tempo">
                    <h2>32°c</h2>
                </div>
                <div>
                    <h1>Qui</h1>
                    <img src="Imagens/Icons para próximos dias/Sol com nuvens.png" alt="tempo">
                    <h2>32°c</h2>
                </div>
                <div>
                    <h1>Sex</h1>
                    <img src="Imagens/Icons para próximos dias/Sol.png" alt="tempo">
                    <h2>32°c</h2>
                </div>
                <div>
                    <h1>Sab</h1>
                    <img src="Imagens/Icons para próximos dias/Nublado.png" alt="tempo">
                    <h2>32°c</h2>
                </div>
            </div>
        </section>
    </main>
    <script src="Javascript/dashboard.js"></script>
    <script src="Javascript/script.js"></script>
</body>
</html>
